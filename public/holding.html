<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Notice | Irish Waterfall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-family: "DM Sans", system-ui, sans-serif;
        text-align: center;
        padding: 4rem 1.5rem;
      }

      .label {
        margin: 0;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: #c4a962;
      }

      h1 {
        margin: 1rem 0 0;
        max-width: 32rem;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(2.25rem, 8vw, 3rem);
        line-height: 1.1;
        font-weight: 500;
      }

      p {
        margin: 1.5rem 0 0;
        max-width: 28rem;
        font-size: 1rem;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.65);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="label">Notice</p>
      <h1>This Site Has Been Deleted</h1>
      <p>Due to lack of response, follow-up, and diligence.</p>
    </main>
  </body>
</html>
